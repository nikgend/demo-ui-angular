apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui-deployment
  namespace: development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-ui
  template:
    metadata:
      labels:
        app: demo-ui
    spec:
      containers:
      - name: demo-ui
        image: your-registry.azurecr.io/demo-ui:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: config-volume
          mountPath: /usr/share/nginx/html/assets/config
      volumes:
      - name: config-volume
        configMap:
          name: demo-ui-config

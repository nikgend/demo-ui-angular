apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ui-ingress
  namespace: development
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - dev.yourdomain.com
    secretName: demo-ui-tls
  rules:
  - host: dev.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-ui-service
            port:
              number: 80

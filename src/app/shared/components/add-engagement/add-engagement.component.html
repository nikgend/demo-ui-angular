<div class="add-engagement-container">
  <div class="card">
    <div class="card-header bg-success text-white">
      <h5 class="mb-0">Add New Engagement</h5>
    </div>
    <div class="card-body">
      <!-- Success Alert -->
      <div class="alert alert-success alert-dismissible fade show" role="alert" *ngIf="showSuccessAlert">
        <strong>Success!</strong> {{ successMessage }}
        <button type="button" class="btn-close" (click)="closeAlert('success')" aria-label="Close"></button>
      </div>

      <!-- Error Alert -->
      <div class="alert alert-danger alert-dismissible fade show" role="alert" *ngIf="showErrorAlert">
        <strong>Error!</strong> {{ errorMessage }}
        <button type="button" class="btn-close" (click)="closeAlert('error')" aria-label="Close"></button>
      </div>

      <!-- Form -->
      <form [formGroup]="engagementForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="row">
          <!-- Engagement Name -->
          <div class="col-md-6 mb-3">
            <label for="engagementName" class="form-label">Engagement Name <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              id="engagementName"
              formControlName="engagementName"
              placeholder="Enter engagement name"
              [class.is-invalid]="engagementForm.get('engagementName')?.invalid && engagementForm.get('engagementName')?.touched">
            <div class="invalid-feedback" *ngIf="engagementForm.get('engagementName')?.invalid && engagementForm.get('engagementName')?.touched">
              <span *ngIf="engagementForm.get('engagementName')?.errors?.['required']">Engagement name is required</span>
              <span *ngIf="engagementForm.get('engagementName')?.errors?.['minlength']">Engagement name must be at least 3 characters</span>
            </div>
          </div>

          <!-- Engagement Code -->
          <div class="col-md-6 mb-3">
            <label for="engagementCode" class="form-label">Engagement Code</label>
            <input
              type="text"
              class="form-control"
              id="engagementCode"
              formControlName="engagementCode"
              placeholder="Enter engagement code">
          </div>
        </div>

        <div class="row">
          <!-- Engagement Manager -->
          <div class="col-md-6 mb-3">
            <label for="engagementManager" class="form-label">Engagement Manager</label>
            <input
              type="text"
              class="form-control"
              id="engagementManager"
              formControlName="engagementManager"
              placeholder="Enter engagement manager name">
          </div>

          <!-- Engagement Partner -->
          <div class="col-md-6 mb-3">
            <label for="engagementPartner" class="form-label">Engagement Partner</label>
            <input
              type="text"
              class="form-control"
              id="engagementPartner"
              formControlName="engagementPartner"
              placeholder="Enter engagement partner name">
          </div>
        </div>

        <div class="row">
          <!-- Period End Date -->
          <div class="col-md-6 mb-3">
            <label for="periodEndDate" class="form-label">Period End Date <span class="text-danger">*</span></label>
            <input
              type="date"
              class="form-control"
              id="periodEndDate"
              formControlName="periodEndDate"
              [class.is-invalid]="engagementForm.get('periodEndDate')?.invalid && engagementForm.get('periodEndDate')?.touched">
            <div class="invalid-feedback" *ngIf="engagementForm.get('periodEndDate')?.invalid && engagementForm.get('periodEndDate')?.touched">
              Period end date is required
            </div>
          </div>
        </div>

        <!-- Form Actions -->
        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
          <button
            type="reset"
            class="btn btn-secondary"
            (click)="resetForm()"
            [disabled]="isLoading">
            Reset
          </button>
          <button
            type="submit"
            class="btn btn-success"
            [disabled]="isLoading">
            <span *ngIf="!isLoading">Add Engagement</span>
            <span *ngIf="isLoading">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Processing...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
